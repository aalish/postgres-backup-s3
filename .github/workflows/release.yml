name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux-amd64:
    name: Build and publish Ubuntu 22.04 asset
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build release assets
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          BINARY_NAME="pgbackup"
          ARCHIVE_BASENAME="${BINARY_NAME}_${VERSION}_linux_amd64"
          BINARY_PATH="dist/${ARCHIVE_BASENAME}"
          ARCHIVE_PATH="dist/${ARCHIVE_BASENAME}.tar.gz"
          CHECKSUM_PATH="dist/${ARCHIVE_BASENAME}.sha256"

          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${BINARY_PATH}" \
            ./cmd/pgbackup

          tar -C dist -czf "${ARCHIVE_PATH}" "${ARCHIVE_BASENAME}"
          sha256sum "${BINARY_PATH}" "${ARCHIVE_PATH}" > "${CHECKSUM_PATH}"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pgbackup_*_linux_amd64
            dist/*.tar.gz
            dist/*.sha256
